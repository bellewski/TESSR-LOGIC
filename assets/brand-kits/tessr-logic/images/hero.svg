<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-label="TESSR-LOGIC offline build pipeline" style="max-width:100%;height:auto">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="heroLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="20" fill="url(#heroBg)"/>
  <!-- pipeline of agent nodes -->
  <g stroke="url(#heroLine)" stroke-width="2.5" fill="none">
    <line x1="150" y1="200" x2="650" y2="200"/>
  </g>
  <g font-family="system-ui, sans-serif" font-size="13" fill="#e5e7eb" text-anchor="middle">
    <g>
      <circle cx="150" cy="200" r="34" fill="#141a2e" stroke="#6366f1" stroke-width="2"/>
      <text x="150" y="205">Architect</text>
    </g>
    <g>
      <circle cx="316" cy="200" r="34" fill="#141a2e" stroke="#8b5cf6" stroke-width="2"/>
      <text x="316" y="205">Coder</text>
    </g>
    <g>
      <circle cx="484" cy="200" r="34" fill="#141a2e" stroke="#8b5cf6" stroke-width="2"/>
      <text x="484" y="205">QA</text>
    </g>
    <g>
      <circle cx="650" cy="200" r="34" fill="#141a2e" stroke="#22d3ee" stroke-width="2"/>
      <text x="650" y="205">Ship</text>
    </g>
  </g>
  <text x="400" y="80" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e5e7eb" text-anchor="middle">Fully offline. Multi-agent. Self-correcting.</text>
  <text x="400" y="340" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">No cloud · No telemetry · Air-gapped</text>
</svg>
